concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
jobs:
  checks:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: 'access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

            download-attempts = 10 # more than usual because nix-cache might be down

            '
      - name: Install Attic
        run: nix profile add .#attic
      - name: Set up Attic cache
        uses: ryanccn/attic-action@v0.4.1
        with:
          cache: nixos-config
          endpoint: https://nix-cache.niols.fr/
          token: ${{ secrets.ATTIC_TOKEN }}
      - name: Set up emulation layer if necessary
        run: "system=${{ matrix.system }}\necho \"system = $system\" > nix-config\nif [ $system != x86_64-linux\
          \ ]; then\n  printf 'This configuration is a %s, for which we need to install QEMU emulation\
          \ binaries.\\n' \"$system\"\n  sudo apt-get update -y && sudo apt-get install -y qemu-user-static\n\
          fi\n"
      - name: Run check “${{ matrix.check }}”
        run: 'export NIX_CONFIG=$(cat nix-config)

          nix build .#checks.${{ matrix.system }}.${{ matrix.check }} --print-build-logs

          '
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: nixops-providers
            system: aarch64-linux
          - check: pre-commit
            system: aarch64-linux
          - check: nixops-deployment
            system: x86_64-linux
          - check: nixops-providers
            system: x86_64-linux
          - check: pre-commit
            system: x86_64-linux
  homeConfigurations:
    name: Home
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: 'access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

            download-attempts = 10 # more than usual because nix-cache might be down

            '
      - name: Install Attic
        run: nix profile add .#attic
      - name: Set up Attic cache
        uses: ryanccn/attic-action@v0.4.1
        with:
          cache: nixos-config
          endpoint: https://nix-cache.niols.fr/
          token: ${{ secrets.ATTIC_TOKEN }}
      - name: Build Home configuration “${{ matrix.home }}”
        run: nix build .#homeConfigurations.${{ matrix.home }}.activationPackage --impure --print-build-logs
    strategy:
      fail-fast: false
      matrix:
        include:
          - home: headless-work
  nixosConfigurations:
    name: NixOS
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: 'access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

            download-attempts = 10 # more than usual because nix-cache might be down

            '
      - name: Install Attic
        run: nix profile add .#attic
      - name: Set up Attic cache
        uses: ryanccn/attic-action@v0.4.1
        with:
          cache: nixos-config
          endpoint: https://nix-cache.niols.fr/
          token: ${{ secrets.ATTIC_TOKEN }}
      - if: ${{ matrix.xtraSpace == 'extra-space' }}
        name: Free some extra space
        run: 'echo ''Available storage before:''

          sudo df -h

          echo

          sudo rm -rf /usr/share/dotnet

          sudo rm -rf /usr/local/lib/android

          sudo rm -rf /opt/ghc

          sudo rm -rf /opt/hostedtoolcache/CodeQL

          echo ''Available storage after:''

          sudo df -h

          echo

          '
      - name: Set up emulation layer if necessary
        run: "system=${{ matrix.system }}\necho \"system = $system\" > nix-config\nif [ $system != x86_64-linux\
          \ ]; then\n  printf 'This configuration is a %s, for which we need to install QEMU emulation\
          \ binaries.\\n' \"$system\"\n  sudo apt-get update -y && sudo apt-get install -y qemu-user-static\n\
          fi\n"
      - name: Build NixOS configuration “${{ matrix.nixos }}”
        run: 'export NIX_CONFIG=$(cat nix-config)

          nix build .#nixosConfigurations.${{ matrix.nixos }}.config.system.build.toplevel --print-build-logs

          '
      - name: Remaining space
        run: 'echo ''Available storage:''

          sudo df -h

          '
      - if: ${{ github.ref == 'refs/heads/main' }}
        name: Deploy NixOps4 component “${{ matrix.nixos }}” if it exists
        run: "if nix develop --command nixops4 members list 2>/dev/null | grep '^${{ matrix.nixos }}$';\
          \ then\n  echo \"${{ secrets.DEPLOY_KEY }}\" > deploy-key\n  chmod 600 deploy-key\n  nix develop\
          \ --command ssh-agent bash -c '\n    ssh-add deploy-key\n    export NIX_CONFIG=$(cat nix-config)\n\
          \    nixops4 apply ${{ matrix.nixos }}\n  '\nfi\n"
    strategy:
      fail-fast: false
      matrix:
        include:
          - nixos: ahlaya
            system: x86_64-linux
            xtraSpace: extra-space
          - nixos: anastasia
            system: x86_64-linux
            xtraSpace: ''
          - nixos: gromit
            system: x86_64-linux
            xtraSpace: extra-space
          - nixos: helga
            system: x86_64-linux
            xtraSpace: ''
          - nixos: orianne
            system: aarch64-linux
            xtraSpace: ''
  summarise:
    if: always()
    name: Summarise
    needs:
      - checks
      - homeConfigurations
      - nixosConfigurations
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          allowed-skips: checks, homeConfigurations, nixosConfigurations
          jobs: ${{ toJSON(needs) }}
name: CI
'on':
  pull_request: {}
  push:
    branches:
      - main
